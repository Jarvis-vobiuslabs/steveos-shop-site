<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8c97e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative lines -->
  <line x1="60" y1="60" x2="1140" y2="60" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="570" x2="1140" y2="570" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <line x1="60" y1="60" x2="60" y2="570" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <line x1="1140" y1="60" x2="1140" y2="570" stroke="#c9a84c" stroke-width="1" opacity="0.3"/>
  <!-- Corner ornaments -->
  <rect x="60" y="60" width="20" height="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="60" y="60" width="4" height="20" fill="#c9a84c" opacity="0.8"/>
  <rect x="1120" y="60" width="20" height="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="1136" y="60" width="4" height="20" fill="#c9a84c" opacity="0.8"/>
  <rect x="60" y="566" width="20" height="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="60" y="550" width="4" height="20" fill="#c9a84c" opacity="0.8"/>
  <rect x="1120" y="566" width="20" height="4" fill="#c9a84c" opacity="0.8"/>
  <rect x="1136" y="550" width="4" height="20" fill="#c9a84c" opacity="0.8"/>
  <!-- Scissors icon -->
  <g transform="translate(600,180)">
    <circle cx="-30" cy="-18" r="18" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <circle cx="30" cy="-18" r="18" fill="none" stroke="url(#gold)" stroke-width="5"/>
    <line x1="-14" y1="-10" x2="45" y2="48" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="-10" x2="-45" y2="48" stroke="url(#gold)" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="19" r="7" fill="#c9a84c"/>
  </g>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="80" font-weight="bold" fill="url(#gold)" letter-spacing="4">STEVEO'S SHOP</text>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#888" letter-spacing="8">PREMIUM BARBERSHOP</text>
  <!-- Gold line -->
  <rect x="480" y="430" width="240" height="2" fill="url(#gold)" opacity="0.6"/>
  <!-- Location -->
  <text x="600" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#c9a84c" opacity="0.8">Calgary NW  •  By Appointment</text>
</svg>
